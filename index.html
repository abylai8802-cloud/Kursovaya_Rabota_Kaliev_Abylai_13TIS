<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <title>КиноКоллекция</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="theme.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header>
        <div class="nav-container">
            <div class="logo">КиноКоллекция</div>
            <nav>
                <a href="index.html" class="nav-link">Коллекция</a>
                <a href="form.html" class="nav-link">Добавить фильм</a>
                <a href="about.html" class="nav-link">О проекте</a>
                <a href="stats.html" class="nav-link">Статистика</a>
                <button id="theme-toggle" class="theme-toggle" title="Сменить тему">
                    ☀️
                </button>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="title fade-in">Моя коллекция фильмов</h1>
        <p class="stats fade-in fade-in-delay-1">Всего фильмов: <span id="total-count">0</span></p>


        <hr class="section-divider">

        <div id="movies-grid" class="movies-grid"></div>


        <hr class="section-divider thin">


        <button onclick="window.location.href='form.html'" class="add-btn">+ Добавить новый фильм</button>
    </main>

    <script src="storage.js"></script>
    <script src="main.js"></script>
    <script src="theme.js"></script>
</body>

</html>
